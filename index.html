<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Energy Management Platform</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0f172a;
            color: white;
        }

        .container {
            padding: 30px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            color: #60a5fa;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .stat {
            background: #0b1220;
            padding: 15px;
            border-radius: 10px;
        }

        .value {
            font-size: 20px;
            color: #fbbf24;
            font-weight: bold;
        }

        button {
            background: #2563eb;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const App = () => {

    const [watts, setWatts] = React.useState(320);
    const [reserve, setReserve] = React.useState(500);
    const [status, setStatus] = React.useState("Normal");

    const checkEnergy = () => {
        if (watts > reserve) {
            setStatus("⚠️ Sobrecarga detectada");
        } else {
            setStatus("✅ Sistema estável");
        }
    };

    return (
        <div className="container">

            <div className="card">
                <div className="title">⚡ Energy Management System</div>
                <p>Sistema inteligente de monitoramento energético</p>
            </div>

            <div className="card">
                <div className="title">📊 Dados em tempo real</div>

                <div className="grid">
                    <div className="stat">
                        <div>Consumo Atual</div>
                        <div className="value">{watts} W</div>
                    </div>

                    <div className="stat">
                        <div>Reserva</div>
                        <div className="value">{reserve} W</div>
                    </div>

                    <div className="stat">
                        <div>Status</div>
                        <div className="value">{status}</div>
                    </div>
                </div>

                <div style={{ marginTop: 20 }}>
                    <button onClick={checkEnergy}>
                        Verificar Sistema
                    </button>
                </div>
            </div>

            <div className="card">
                <div className="title">🔧 Simulação de Ajuste</div>

                <button onClick={() => setWatts(watts + 50)}>
                    Aumentar Consumo
                </button>

                <button onClick={() => setWatts(watts - 50)} style={{ marginLeft: 10 }}>
                    Reduzir Consumo
                </button>
            </div>

        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
