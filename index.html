<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ENDE+ Inteligente</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js"></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: sans-serif; }
    .gold { background: linear-gradient(135deg,#C9A646,#E5C063); }
  </style>
</head>

<body class="bg-slate-100">
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect, useMemo } = React;
const { AreaChart, Area, ResponsiveContainer, Tooltip } = Recharts;

function App(){

  const [view,setView] = useState('landing');
  const [role,setRole] = useState('customer');

  const [balance,setBalance] = useState(8000);
  const [debt,setDebt] = useState(12000);

  const [isPaying,setIsPaying] = useState(false);
  const [power,setPower] = useState(true);

  // consumo automático seguro
  useEffect(()=>{
    const interval = setInterval(()=>{
      setBalance(prev=>{
        if(prev <= 0){
          setDebt(d => d + Math.floor(Math.random()*300));
          return 0;
        }

        const use = Math.floor(Math.random()*200);
        const next = prev - use;

        if(next <= 0){
          setDebt(d => d + Math.abs(next));
          return 0;
        }

        return next;
      });
    },4000);

    return ()=>clearInterval(interval);
  },[]);

  // lógica energia
  useEffect(()=>{
    if(balance <= 0 || debt > 20000){
      setPower(false);
    } else {
      setPower(true);
    }
  },[balance,debt]);

  // score cliente
  const score = useMemo(()=>{
    if(debt < 5000) return "Bom";
    if(debt < 15000) return "Risco";
    return "Crítico";
  },[debt]);

  // gráfico
  const chart = useMemo(()=>{
    return Array.from({length:7},(_,i)=>({
      day:`Dia ${i+1}`,
      kwh: Math.floor(Math.random()*60)+10
    }));
  },[]);

  // pagamento
  const pay = ()=>{
    if(isPaying) return;

    setIsPaying(true);

    setTimeout(()=>{
      let amount = 10000;

      if(debt > 0){
        if(amount >= debt){
          amount -= debt;
          setDebt(0);
          setBalance(b=>b+amount);
        }else{
          setDebt(d=>d-amount);
        }
      }else{
        setBalance(b=>b+amount);
      }

      setIsPaying(false);
    },1500);
  };

  if(view === 'landing'){
    return (
      <div className="h-screen flex items-center justify-center gold text-white text-center">
        <div>
          <h1 className="text-4xl font-bold mb-6">ENDE+ Inteligente</h1>
          <button onClick={()=>{setRole('customer');setView('app')}} className="bg-white text-black px-6 py-3 m-2 rounded">Cliente</button>
          <button onClick={()=>{setRole('admin');setView('app')}} className="bg-black text-white px-6 py-3 m-2 rounded">Admin</button>
        </div>
      </div>
    );
  }

  return(
    <div className="p-6 space-y-6">

      {role === 'customer' && (
        <div className="max-w-xl mx-auto space-y-6">

          <div className="gold text-white p-6 rounded-3xl">

            <h2 className="text-4xl font-bold">{balance} Kz</h2>
            <p>Dívida: {debt} Kz</p>

            <p className={power ? "text-green-200" : "text-red-300"}>
              {power ? "Energia Activa" : "Energia Cortada"}
            </p>

            <p>Score: {score}</p>

            <button onClick={pay} className="mt-4 bg-white text-black px-5 py-2 rounded">
              {isPaying ? "Processando..." : "Pagar (Multicaixa)"}
            </button>

          </div>

          <div className="bg-white p-4 rounded-xl">
            <h3 className="font-bold mb-2">Consumo</h3>

            <div style={{height:200}}>
              <ResponsiveContainer width="100%" height="100%">
                <AreaChart data={chart}>
                  <Area dataKey="kwh" stroke="#C9A646" fill="#C9A64633"/>
                  <Tooltip/>
                </AreaChart>
              </ResponsiveContainer>
            </div>

          </div>

        </div>
      )}

      {role === 'admin' && (
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">

          {[
            {l:"Receita Recuperada",v:"5.2M Kz"},
            {l:"Dívida Total",v:"120M Kz"},
            {l:"Cortes Automáticos",v:"8,421"},
            {l:"Perdas Evitadas",v:"3.8M Kz"}
          ].map((s,i)=>(
            <div key={i} className="bg-white p-4 rounded-xl">
              <p className="text-xs">{s.l}</p>
              <p className="font-bold">{s.v}</p>
            </div>
          ))}

        </div>
      )}

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

</script>
</body>
</html>
