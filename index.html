<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>ENDE+ Enterprise</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & Recharts Dependencies (Production Builds) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js"></script>
  
  <style>
    :root {
      --gold-primary: #C9A646;
      --gold-secondary: #E5C063;
      --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
    }
    
    body { 
      font-family: 'Inter', sans-serif; 
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;
      margin: 0;
      padding: 0;
    }
    
    .gold { background: linear-gradient(135deg, var(--gold-primary), var(--gold-secondary)); }
    .glass { 
      background: rgba(255, 255, 255, 0.85); 
      backdrop-filter: blur(12px); 
      -webkit-backdrop-filter: blur(12px);
    }
    
    .chat-bubble { border-radius: 20px 20px 0 20px; }
    
    /* Fix for Recharts in hidden containers */
    .recharts-responsive-container {
      min-width: 0;
    }

    /* Safe area padding for modern mobile devices */
    .pb-safe {
      padding-bottom: calc(6rem + var(--safe-area-inset-bottom));
    }
    .bottom-nav {
      padding-bottom: var(--safe-area-inset-bottom);
    }

    /* Simple animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
<div id="root"></div>

<script>
// Standard JavaScript (No Babel required)
const e = React.createElement;
const { useState, useEffect, useMemo, useCallback } = React;
const { AreaChart, Area, ResponsiveContainer, XAxis } = Recharts;

function App() {
  const [view, setView] = useState('landing');
  const [role, setRole] = useState('customer');
  const [balance, setBalance] = useState(8000);
  const [debt, setDebt] = useState(12000);
  const [isPaying, setIsPaying] = useState(false);
  const [power, setPower] = useState(true);
  const [showChat, setShowChat] = useState(false);
  const [notifications, setNotifications] = useState([]);
  
  const chartData = useMemo(() => 
    Array.from({length: 12}, (_, i) => ({
      name: i,
      v: Math.floor(Math.random() * 40) + 60
    })), []
  );

  useEffect(() => {
    const timer = setInterval(() => {
      setBalance(prev => {
        if(prev <= 0) {
          setDebt(d => d + 50);
          return 0;
        }
        return prev - 20;
      });
    }, 5000);
    return () => clearInterval(timer);
  }, []);

  useEffect(() => {
    setPower(balance > 0 && debt < 25000);
  }, [balance, debt]);

  const pay = useCallback(() => {
    if (isPaying) return;
    setIsPaying(true);
    setTimeout(() => {
      setDebt(prevDebt => {
        const paymentAmount = 10000;
        if (prevDebt > 0) {
          const toDebt = Math.min(prevDebt, paymentAmount);
          const remaining = paymentAmount - toDebt;
          setBalance(b => b + remaining);
          return prevDebt - toDebt;
        } else {
          setBalance(b => b + paymentAmount);
          return 0;
        }
      });
      setIsPaying(false);
      setNotifications(prev => ["Pagamento de 10.000 Kz confirmado!", ...prev].slice(0, 5));
    }, 1500);
  }, [isPaying]);

  if (view === 'landing') {
    return e('div', { className: 'min-h-screen flex flex-col items-center justify-center gold text-white px-6' },
      e('div', { className: 'bg-white/20 p-8 md:p-12 rounded-[40px] backdrop-blur-md border border-white/30 text-center w-full max-w-sm shadow-2xl animate-fade-in' },
        e('div', { className: 'w-20 h-20 bg-white rounded-3xl mx-auto mb-6 flex items-center justify-center text-3xl font-black text-[#C9A646] shadow-xl' }, 'E+'),
        e('h1', { className: 'text-3xl font-bold mb-2 tracking-tighter' }, 'ENDE+ Pro'),
        e('p', { className: 'mb-8 opacity-90 text-sm' }, 'Gestão Inteligente de Energia Angola'),
        e('div', { className: 'space-y-3' },
          e('button', { 
            onClick: () => { setRole('customer'); setView('app'); },
            className: 'w-full bg-white text-black py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all hover:bg-slate-50'
          }, 'Sou Cliente'),
          e('button', { 
            onClick: () => { setRole('admin'); setView('app'); },
            className: 'w-full bg-black/20 text-white py-4 rounded-2xl font-bold border border-white/30 active:scale-95 transition-all hover:bg-black/30'
          }, 'Administração')
        )
      ),
      e('p', { className: 'mt-8 text-[10px] uppercase tracking-widest opacity-60' }, '© 2024 ENDE EP - Angola')
    );
  }

  const header = e('header', { className: 'glass sticky top-0 p-4 border-b flex justify-between items-center z-50' },
    e('h2', { className: 'font-black text-xl tracking-tighter cursor-pointer', onClick: () => setView('landing') },
      'ENDE', e('span', { className: 'text-[#C9A646]' }, '+')
    ),
    e('div', { className: 'flex items-center gap-3' },
      e('span', { className: 'text-[10px] font-bold bg-slate-200 text-slate-600 px-2 py-1 rounded uppercase tracking-widest' }, 
        role === 'customer' ? 'Cliente' : 'Admin'
      ),
      e('div', { className: 'flex items-center gap-1.5' },
        e('div', { className: `w-2.5 h-2.5 rounded-full ${power ? 'bg-green-500' : 'bg-red-500'} shadow-sm` }),
        e('span', { className: 'text-[10px] font-bold text-slate-400 uppercase' }, power ? 'Online' : 'Offline')
      )
    )
  );

  const customerView = e('div', { className: 'space-y-6 animate-fade-in' },
    e('div', { className: 'gold text-white p-8 rounded-[35px] shadow-2xl relative overflow-hidden' },
      e('div', { className: 'relative z-10' },
        e('p', { className: 'text-xs font-bold opacity-80 uppercase mb-1' }, 'Saldo Disponível'),
        e('div', { className: 'flex items-baseline gap-2 mb-6' },
          e('h2', { className: 'text-5xl font-black' }, balance.toLocaleString()),
          e('span', { className: 'text-xl font-bold opacity-70' }, 'Kz')
        ),
        e('div', { className: 'flex justify-between items-center border-t border-white/20 pt-5' },
          e('div', null,
            e('p', { className: 'text-[10px] uppercase opacity-70 font-bold' }, 'Dívida Acumulada'),
            e('p', { className: 'font-bold text-lg' }, debt.toLocaleString() + ' Kz')
          ),
          e('button', { 
            onClick: pay, 
            disabled: isPaying,
            className: `bg-white text-black px-6 py-3 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition-all ${isPaying ? 'opacity-70' : ''}`
          }, isPaying ? 'Processando...' : 'Recarregar')
        )
      ),
      e('div', { className: 'absolute -right-4 -top-4 w-32 h-32 bg-white/10 rounded-full blur-3xl' }),
      e('div', { className: 'absolute -left-10 -bottom-10 w-40 h-40 bg-black/5 rounded-full blur-3xl' })
    ),
    e('div', { className: 'bg-white p-6 rounded-3xl shadow-sm border border-slate-100' },
      e('div', { className: 'flex justify-between items-center mb-6' },
        e('div', null,
          e('h3', { className: 'font-black text-slate-800' }, 'Consumo Energético'),
          e('p', { className: 'text-[10px] text-slate-400 font-bold uppercase' }, 'Últimas 12 horas')
        ),
        e('span', { className: 'text-[10px] font-bold text-green-600 bg-green-50 px-2 py-1 rounded-full border border-green-100 animate-pulse' }, 'LIVE')
      ),
      e('div', { className: 'h-48 w-full' },
        e(ResponsiveContainer, { width: '100%', height: '100%' },
          e(AreaChart, { data: chartData },
            e('defs', null,
              e('linearGradient', { id: 'colorValue', x1: '0', y1: '0', x2: '0', y2: '1' },
                e('stop', { offset: '5%', stopColor: '#C9A646', stopOpacity: 0.3 }),
                e('stop', { offset: '95%', stopColor: '#C9A646', stopOpacity: 0 })
              )
            ),
            e(Area, { 
              type: 'monotone', 
              dataKey: 'v', 
              stroke: '#C9A646', 
              fillOpacity: 1, 
              fill: 'url(#colorValue)', 
              strokeWidth: 3 
            })
          )
        )
      )
    ),
    notifications.length > 0 && e('div', { className: 'space-y-3' },
      e('h4', { className: 'text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest' }, 'Histórico de Transações'),
      notifications.map((n, i) => e('div', { key: i, className: 'bg-white border border-slate-100 p-4 rounded-2xl shadow-sm flex justify-between items-center' },
        e('div', { className: 'flex items-center gap-3' },
          e('div', { className: 'w-8 h-8 bg-green-50 rounded-full flex items-center justify-center text-green-600' }, '✓'),
          e('span', { className: 'text-xs font-bold text-slate-700' }, n)
        ),
        e('button', { className: 'text-[10px] font-bold text-[#C9A646] hover:underline' }, 'RECIBO PDF')
      ))
    )
  );

  const adminView = e('div', { className: 'space-y-6 animate-fade-in' },
    e('div', { className: 'grid grid-cols-2 gap-4' },
      [
        {l:"Receita (Hoje)", v:"12.4M", c:"text-green-600", i:"💰"},
        {l:"Cortes Activos", v:"1,204", c:"text-red-500", i:"⚠️"},
        {l:"Dívida Nacional", v:"482M", c:"text-slate-800", i:"📊"},
        {l:"Agentes Campo", v:"84", c:"text-[#C9A646]", i:"👷"}
      ].map((s, i) => e('div', { key: i, className: 'bg-white p-5 rounded-3xl border border-slate-100 shadow-sm' },
        e('div', { className: 'flex justify-between items-start mb-2' },
          e('p', { className: 'text-[10px] font-bold text-slate-400 uppercase' }, s.l),
          e('span', { className: 'text-sm' }, s.i)
        ),
        e('p', { className: `text-2xl font-black ${s.c}` }, s.v)
      ))
    ),
    e('div', { className: 'bg-white p-6 rounded-3xl border border-slate-100 shadow-sm' },
      e('h3', { className: 'font-black mb-4 uppercase text-[10px] tracking-widest text-slate-400' }, 'Estado das Províncias'),
      e('div', { className: 'grid gap-3' },
        ['Luanda','Benguela','Huambo','Cabinda'].map(p => e('div', { key: p, className: 'flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100' },
          e('span', { className: 'font-bold text-sm text-slate-700' }, p),
          e('div', { className: 'flex gap-1.5' },
            e('div', { className: 'w-2.5 h-2.5 rounded-full bg-green-500 shadow-sm' }),
            e('div', { className: 'w-2.5 h-2.5 rounded-full bg-green-500 shadow-sm' }),
            e('div', { className: 'w-2.5 h-2.5 rounded-full bg-red-400 animate-pulse shadow-sm' })
          )
        ))
      )
    )
  );

  const chatBot = e('div', { className: 'fixed bottom-24 right-6 z-50 flex flex-col items-end' },
    showChat && e('div', { className: 'bg-white w-72 h-96 shadow-2xl rounded-[30px] border border-slate-100 flex flex-col overflow-hidden mb-4 animate-fade-in' },
      e('div', { className: 'gold p-5 text-white font-bold flex justify-between items-center' },
        e('div', { className: 'flex items-center gap-2' },
          e('div', { className: 'w-2 h-2 bg-green-400 rounded-full animate-pulse' }),
          e('span', { className: 'text-sm' }, 'Assistente E+')
        ),
        e('button', { onClick: () => setShowChat(false), className: 'opacity-70' }, '✕')
      ),
      e('div', { className: 'flex-1 p-4 space-y-4 overflow-y-auto bg-slate-50' },
        e('div', { className: 'bg-white p-3 rounded-2xl rounded-bl-none text-xs w-5/6 shadow-sm border border-slate-100' },
          'Olá! Sou o assistente virtual da ENDE. Como posso ajudar com o seu contador hoje?'
        ),
        isPaying && e('div', { className: 'bg-[#C9A646] text-white p-3 rounded-2xl rounded-br-none text-xs ml-auto w-5/6 shadow-md' },
          'Estou a realizar um carregamento agora.'
        )
      ),
      e('div', { className: 'p-3 bg-white border-t' },
        e('div', { className: 'bg-slate-100 rounded-full px-4 py-2 text-[10px] text-slate-400 font-bold' }, 'Escreva uma mensagem...')
      )
    ),
    e('button', { 
      onClick: () => setShowChat(!showChat), 
      className: 'w-14 h-14 gold rounded-full shadow-2xl flex items-center justify-center text-2xl text-white active:scale-90 transition-all'
    }, showChat ? '✕' : '💬')
  );

  const nav = e('nav', { className: 'fixed bottom-0 left-0 right-0 glass border-t border-slate-200 flex justify-around items-center z-40 bottom-nav h-20' },
    e('button', { className: 'flex flex-col items-center gap-1 px-4' },
      e('span', { className: 'text-xl' }, '🏠'),
      e('span', { className: 'text-[10px] font-bold text-[#C9A646]' }, 'Painel')
    ),
    e('button', { className: 'flex flex-col items-center gap-1 px-4 opacity-40' },
      e('span', { className: 'text-xl' }, '⚡'),
      e('span', { className: 'text-[10px] font-bold' }, 'Serviços')
    ),
    e('button', { className: 'flex flex-col items-center gap-1 px-4 opacity-40' },
      e('span', { className: 'text-xl' }, '⚙️'),
      e('span', { className: 'text-[10px] font-bold' }, 'Ajustes')
    )
  );

  return e('div', { className: 'min-h-screen bg-slate-50 flex flex-col' },
    header,
    e('main', { className: 'flex-1 p-4 space-y-6 max-w-2xl mx-auto w-full pb-safe' },
      role === 'customer' ? customerView : adminView
    ),
    chatBot,
    nav
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));
</script>
</body>
</html>
